apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-speak-ingress
  namespace: ${NAMESPACE}
spec:
  ingressClassName: nginx
  rules:
  - host: site-speak.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-speak-service
            port:
              number: 80
  - host: grafana.local-ktelop.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: prometheus.local-ktelop.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
  - host: collector-demo.local-ktelop.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: otel-collector
            port:
              number: 4318
