apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-speak-ingress-prod
  namespace: ${NAMESPACE}
  annotations:
    # Match long-running /api/* (LLM) requests; ingress-nginx defaults are ~60s → 504 in prod.
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ${APP_HOST}
    secretName: sitespeak-root-tls
  rules:
  - host: ${APP_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-speak-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-speak-ingress-wildcard
  namespace: ${NAMESPACE}
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ${GRAFANA_HOST}
    - ${PROMETHEUS_HOST}
    - ${COLLECTOR_HOST}
    secretName: sitespeak-wildcard-tls
  rules:
  - host: ${GRAFANA_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: ${PROMETHEUS_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
  - host: ${COLLECTOR_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: otel-collector
            port:
              number: 4318
