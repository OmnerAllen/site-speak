apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ${NAMESPACE}
  name: api-deployment
  labels:
    app: api
spec:
  replicas: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: omallen/site-speak-api:0.0.${GITHUB_RUN_NUMBER}
        ports:
        - containerPort: 5000
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: ASPNETCORE_URLS
          value: http://+:5000
        - name: ConnectionStrings__DefaultConnection
          value: Host=postgres-service;Port=5432;Database=$(POSTGRES_DB);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector:4318
        # Substituted by CI (envsubst); must match client image build arg AI_CHAT_ENABLED.
        - name: Features__AiChatEnabled
          value: "${AI_CHAT_ENABLED}"
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]
        envFrom:
        - secretRef:
            name: postgres-secret