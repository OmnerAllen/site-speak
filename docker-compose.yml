  client:
    image: node:20-alpine
    container_name: sitespeak-client
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    command: >-
      sh -c "npm install -g pnpm && pnpm i && pnpm run dev --host 0.0.0.0"
    
