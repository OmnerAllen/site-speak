services:
  db:
    image: postgres:18
    container_name: sitespeak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sitespeak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/1-seed_supplier.sql:/docker-entrypoint-initdb.d/02-seed_supplier.sql
      - ./database/2-seed_equipment.sql:/docker-entrypoint-initdb.d/03-seed_equipment.sql
      - ./database/2-seed_material.sql:/docker-entrypoint-initdb.d/04-seed_material.sql
      - ./database/3-seed_basic.sql:/docker-entrypoint-initdb.d/05-seed_basic.sql
      - ./database/4-seed_auth.sql:/docker-entrypoint-initdb.d/06-seed_auth.sql

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: sitespeak-api
    ports:
      - "5000:5000"
    working_dir: /app
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=sitespeak;Username=postgres;Password=postgres
      # LLM must be reachable from this container (localhost:9292 is wrong unless the model runs inside the same container)
      - Llm__ChatCompletionsUrl=${LLM_CHAT_COMPLETIONS_URL:-https://ai-snow.reindeer-pinecone.ts.net:9292/v1/chat/completions}
      - Llm__Model=${LLM_MODEL:-gemma4-31b}
    volumes:
      - ./api:/app
      # api.csproj references ../SiteSpeak.Logic — must exist beside /app in the container
      - ./SiteSpeak.Logic:/SiteSpeak.Logic
    command: dotnet watch run --non-interactive --no-launch-profile
    depends_on:
      - db
      - otel-collector

  client:
    image: node:20-alpine
    container_name: sitespeak-client
    ports:
      - "5173:5173"
    working_dir: /app
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    command: >-
      sh -c "npm install -g pnpm && pnpm i && pnpm run dev --host 0.0.0.0"
    depends_on:
      - db

  otel-collector:
    image: otel/opentelemetry-collector:0.146.1
    volumes:
      - ./config/otel-config.yml:/etc/otelcol/config.yaml
    ports:
      - 1777:1777 # pprof extension
      - 8888:8888 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
      - 55679:55679 # zpages extension

  prometheus:
    image: prom/prometheus:v3
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:3.5.11
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=alertingSimplifiedRouting,alertingQueryAndExpressionsStepMode
    image: grafana/grafana:12.3.4
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yaml
      - ./config/grafana-dashboard-provisioning.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/grafana-dashboard.json:/var/lib/grafana/dashboards/sitespeak-dashboard.json
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  prometheus_data:
