services:
  db:
    image: postgres:18
    container_name: sitespeak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sitespeak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/1-seed_supplier.sql:/docker-entrypoint-initdb.d/02-seed_supplier.sql
      - ./database/2-seed_equipment.sql:/docker-entrypoint-initdb.d/03-seed_equipment.sql
      - ./database/2-seed_material.sql:/docker-entrypoint-initdb.d/04-seed_material.sql
      - ./database/3-seed_basic.sql:/docker-entrypoint-initdb.d/05-seed_basic.sql

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: sitespeak-api
    ports:
      - "5000:5000"
    working_dir: /app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=sitespeak;Username=postgres;Password=postgres
    volumes:
      - ./api:/app
    command: dotnet watch run --non-interactive --no-launch-profile
    depends_on:
      - db

  client:
    image: node:20-alpine
    container_name: sitespeak-client
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    command: >-
      sh -c "npm install -g pnpm && pnpm i && pnpm run dev --host 0.0.0.0"
    depends_on:
      - db

volumes:
  postgres_data:
