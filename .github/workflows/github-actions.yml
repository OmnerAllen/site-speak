name: Deploy site-speak
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, closed]
  workflow_dispatch:
    inputs:
      ai_chat_enabled:
        description: >-
          Enable AI chat (project-details panel + API). Push/PR builds use repository variable
          AI_CHAT_ENABLED instead (set to false to disable).
        type: boolean
        default: true

jobs:
  cleanup-pr-namespace:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: self-hosted
    steps:
      - name: Delete PR Namespace
        run: |
          PR_USER=$(echo "${{ github.event.pull_request.user.login }}" | tr '[:upper:]' '[:lower:]')
          kubectl delete namespace "site-speak-pr-${PR_USER}-${{ github.event.pull_request.number }}" --ignore-not-found

  site-speak-deploy:
    name: site-speak-deploy
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: self-hosted
    # Single knob: repository variable AI_CHAT_ENABLED=false disables chat, or override on workflow_dispatch.
    env:
      AI_CHAT_ENABLED: ${{ github.event_name == 'workflow_dispatch' && (inputs.ai_chat_enabled && 'true' || 'false') || (vars.AI_CHAT_ENABLED == 'false' && 'false' || 'true') }}
    permissions:
      pull-requests: write
    steps:
      - name: Set target namespace
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_USER=$(echo "${{ github.event.pull_request.user.login }}" | tr '[:upper:]' '[:lower:]')
            echo "NAMESPACE=site-speak-pr-${PR_USER}-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "APP_HOST=${PR_USER}-pr-${{ github.event.pull_request.number }}.site-speak.duckdns.org" >> $GITHUB_ENV
            echo "APP_TLS_SECRET=sitespeak-wildcard-tls" >> $GITHUB_ENV
            echo "CLIENT_ID=site-speak-dev" >> $GITHUB_ENV
            echo "GRAFANA_HOST=grafana-${PR_USER}-pr-${{ github.event.pull_request.number }}.site-speak.duckdns.org" >> $GITHUB_ENV
            echo "PROMETHEUS_HOST=prometheus-${PR_USER}-pr-${{ github.event.pull_request.number }}.site-speak.duckdns.org" >> $GITHUB_ENV
            echo "COLLECTOR_HOST=otel-collector-${PR_USER}-pr-${{ github.event.pull_request.number }}.site-speak.duckdns.org" >> $GITHUB_ENV
          else
            echo "NAMESPACE=site-speak-prod" >> $GITHUB_ENV
            echo "APP_HOST=site-speak.duckdns.org" >> $GITHUB_ENV
            echo "APP_TLS_SECRET=sitespeak-root-tls" >> $GITHUB_ENV
            echo "CLIENT_ID=site-speak" >> $GITHUB_ENV
            echo "GRAFANA_HOST=grafana.site-speak.duckdns.org" >> $GITHUB_ENV
            echo "PROMETHEUS_HOST=prometheus.site-speak.duckdns.org" >> $GITHUB_ENV
            echo "COLLECTOR_HOST=otel-collector.site-speak.duckdns.org" >> $GITHUB_ENV
          fi

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: lint api
        run: |
          nix-shell -p dotnetCorePackages.sdk_10_0-bin \
            --run "dotnet format site-speak.sln --verify-no-changes"

      - name: lint client
        run: |
          nix-shell -p nodejs_22 pnpm \
            --run "cd client && pnpm install --frozen-lockfile && pnpm run lint"

      - name: Unit tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_10_0-bin \
            --run "dotnet build site-speak.sln -c Release && dotnet test SiteSpeak.Logic.Tests/SiteSpeak.Logic.Tests.csproj -c Release --verbosity minimal"

      - name: Integration tests
        run: |
          nix-shell -p dotnetCorePackages.sdk_10_0-bin \
            --run "bash tools/run-integration-tests.sh"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push client Docker image
        run: |
          echo "AI_CHAT_ENABLED=$AI_CHAT_ENABLED (client Vite + API Deployment)"
          docker build \
            --build-arg "VITE_CLIENT_ID=$CLIENT_ID" \
            --build-arg "AI_CHAT_ENABLED=$AI_CHAT_ENABLED" \
            -t omallen/site-speak:0.0.$GITHUB_RUN_NUMBER \
            -f Dockerfile.client .
          docker push omallen/site-speak:0.0.$GITHUB_RUN_NUMBER

      - name: build and push API Docker image
        run: |
          docker build -t omallen/site-speak-api:0.0.$GITHUB_RUN_NUMBER -f Dockerfile.api .
          docker push omallen/site-speak-api:0.0.$GITHUB_RUN_NUMBER

      - name: Deploy namespace
        run: envsubst < kubernetes/0-namespace.yml | kubectl apply -f -

      - name: Copy TLS secret to PR namespace
        run: |
          if [[ "$NAMESPACE" != "site-speak-prod" ]]; then
            kubectl get secret sitespeak-wildcard-tls -n site-speak-prod -o json | \
            jq 'del(.metadata["namespace","creationTimestamp","resourceVersion","uid"])' | \
            kubectl apply -n $NAMESPACE -f - || echo "TLS secret copy failed or not found in prod"
          fi


      - name: Create Postgres init-sql ConfigMap
        run: |
          kubectl create configmap init-sql \
            --namespace=$NAMESPACE \
            --from-file=01-schema.sql=database/schema.sql \
            --from-file=02-seed_supplier.sql=database/1-seed_supplier.sql \
            --from-file=03-seed_equipment.sql=database/2-seed_equipment.sql \
            --from-file=04-seed_material.sql=database/2-seed_material.sql \
            --from-file=05-seed_basic.sql=database/3-seed_basic.sql \
            --from-file=06-seed_auth.sql=database/4-seed_auth.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Otel-Collector ConfigMap
        run: |
          kubectl delete -n $NAMESPACE configmap otel-config-configmap || true
          kubectl create -n $NAMESPACE configmap otel-config-configmap \
            --from-file=config/otel-config.yml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Prometheus ConfigMap
        run: |
          kubectl delete -n $NAMESPACE configmap prometheus-config || true
          kubectl create -n $NAMESPACE configmap prometheus-config \
            --from-file=prometheus.yml=config/prometheus.yml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Grafana ConfigMap
        run: |
          kubectl delete -n $NAMESPACE configmap grafana-config || true
          kubectl create -n $NAMESPACE configmap grafana-config \
            --from-file=config/grafana-datasources.yml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Grafana Dashboard Provisioning ConfigMap
        run: |
          kubectl delete -n $NAMESPACE configmap grafana-dashboard-provisioning || true
          kubectl create -n $NAMESPACE configmap grafana-dashboard-provisioning \
            --from-file=config/grafana-dashboard-provisioning.yml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Grafana Dashboards ConfigMap
        run: |
          kubectl delete -n $NAMESPACE configmap grafana-dashboards || true
          kubectl create -n $NAMESPACE configmap grafana-dashboards \
            --from-file=sitespeak-dashboard.json=config/grafana-dashboard.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes manifests
        run: |
          for f in kubernetes/*.y*ml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Comment PR with preview link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const host = process.env.APP_HOST;
            const body = `🔗 Preview deployment: https://${host}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Preview deployment:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy-synthetic-probe:
    name: Deploy synthetic probe
    # Only prod-style runs on main (not PR preview deploys). Push to main is always main here; workflow_dispatch must be from main.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    permissions:
      actions: read
      contents: read
    steps:
      - name: Set target hosts (prod only)
        run: |
          echo "APP_HOST=site-speak.duckdns.org" >> $GITHUB_ENV
          echo "COLLECTOR_HOST=otel-collector.site-speak.duckdns.org" >> $GITHUB_ENV

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build DeployProbeLog
        run: |
          nix-shell -p dotnetCorePackages.sdk_10_0-bin \
            --run "dotnet build tools/DeployProbeLog/DeployProbeLog.csproj -c Release"

      - name: Run probe until deploy completes then export OTLP
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_PROBE_RPS: "80"
          DEPLOY_PROBE_MAX_WAIT: "180"
        run: |
          nix-shell -p dotnetCorePackages.sdk_10_0-bin \
            --run "bash tools/run_deploy_probe.sh"

  deploy-probe-report:
    name: Deploy / probe summary
    needs: [site-speak-deploy, deploy-synthetic-probe]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report job results
        run: |
          echo "site-speak-deploy: ${{ needs.site-speak-deploy.result }}"
          echo "deploy-synthetic-probe: ${{ needs.deploy-synthetic-probe.result }}"
          if [[ "${{ needs.deploy-synthetic-probe.result }}" == "failure" ]]; then
            echo "::error::Synthetic probe job failed — the probe machinery itself broke (not just app errors during deploy). Check workflow logs."
            exit 1
          fi

  discord-notify:
    name: Notify Discord on failure
    needs: [site-speak-deploy, deploy-synthetic-probe]
    if: ${{ always() && (needs.site-speak-deploy.result == 'failure' || needs.deploy-synthetic-probe.result == 'failure') }}
    runs-on: self-hosted
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request && github.event.pull_request.title || '' }}
          PR_NUMBER: ${{ github.event.pull_request && github.event.pull_request.number || '' }}
          PR_AUTHOR: ${{ github.event.pull_request && github.event.pull_request.user.login || '' }}
        run: |
          python3 << 'PY'
          import json, os, sys, urllib.error, urllib.request

          wh = (os.environ.get("DISCORD_WEBHOOK_URL") or "").strip()
          if not wh:
              print("DISCORD_WEBHOOK_URL is missing or empty (check repo Actions secrets).", file=sys.stderr)
              sys.exit(1)

          pr_title = (os.environ.get("PR_TITLE") or "").strip()
          pr_number = (os.environ.get("PR_NUMBER") or "").strip()
          pr_author = (os.environ.get("PR_AUTHOR") or "").strip()
          if os.environ.get("GH_EVENT_NAME") == "pull_request" and pr_number:
              title = pr_title if pr_title else "(no title)"
              who = pr_author if pr_author else "(unknown)"
              content = f"{title}\nPR #{pr_number}\nOpened by: {who}"
          else:
              content = "**site-speak pipeline failed**"

          payload = json.dumps({"content": content}).encode()
          req = urllib.request.Request(
              wh,
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "site-speak-github-actions/1.0",
              },
              method="POST",
          )
          try:
              urllib.request.urlopen(req)
          except urllib.error.HTTPError as e:
              print(f"Discord returned {e.code}: {e.reason}. Check the webhook URL in Discord (Server Settings → Integrations → Webhooks) and repo secret DISCORD_WEBHOOK_URL.", file=sys.stderr)
              raise
          PY
