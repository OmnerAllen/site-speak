name: Deploy site-speak
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  site-speak-deploy:
    runs-on: self-hosted
    env:
      NAMESPACE: site-speak-v${{ github.run_number }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push client Docker image
        run: |
          docker build -t omallen/site-speak:0.0.$GITHUB_RUN_NUMBER -f Dockerfile.client .
          docker push omallen/site-speak:0.0.$GITHUB_RUN_NUMBER

      - name: build and push API Docker image
        run: |
          docker build -t omallen/site-speak-api:0.0.$GITHUB_RUN_NUMBER -f Dockerfile.api .
          docker push omallen/site-speak-api:0.0.$GITHUB_RUN_NUMBER

      - name: Deploy namespace
        run: envsubst < kubernetes/0-namespace.yml | kubectl apply -f -

      - name: Create Postgres init-sql ConfigMap
        run: |
          kubectl create configmap init-sql \
            --namespace=$NAMESPACE \
            --from-file=01-schema.sql=database/schema.sql \
            --from-file=02-seed_supplier.sql=database/1-seed_supplier.sql \
            --from-file=03-seed_equipment.sql=database/2-seed_equipment.sql \
            --from-file=04-seed_material.sql=database/2-seed_material.sql \
            --from-file=05-seed_basic.sql=database/3-seed_basic.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes manifests
        run: |
          for f in kubernetes/*.y*ml; do
            envsubst < "$f" | kubectl apply -f -
          done

