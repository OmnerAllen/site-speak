name: Deploy site-speak
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  site-speak-deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: client
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build and push Docker image
        run: |
          docker build -t omallen/site-speak:0.0.$GITHUB_RUN_NUMBER -f Dockerfile .
          docker push omallen/site-speak:0.0.$GITHUB_RUN_NUMBER

