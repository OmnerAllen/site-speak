name: Restore Database (Prod)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  restore:
    runs-on: self-hosted
    steps:
      - name: Locate Latest Backup
        id: find_backup
        run: |
          BACKUP_POD=$(kubectl get pod -l app=backup-storage -n site-speak-db-backup -o jsonpath="{.items[0].metadata.name}")
          LATEST_BACKUP=$(kubectl exec -n site-speak-db-backup ${BACKUP_POD} -- sh -c "cd /backups && ls -1t *.sql | head -n 1")
          if [ -z "$LATEST_BACKUP" ]; then
            echo "No backups found!"
            exit 1
          fi
          echo "Found latest backup: $LATEST_BACKUP"
          echo "LATEST_BACKUP=$LATEST_BACKUP" >> $GITHUB_ENV
          echo "BACKUP_POD=$BACKUP_POD" >> $GITHUB_ENV

      - name: Wait for Postgres to be Ready
        run: kubectl rollout status deployment/postgres-deployment -n site-speak-prod

      - name: Scale down API
        run: |
          echo "Scaling down api-deployment to 0..."
          kubectl scale deployment api-deployment --replicas=0 -n site-speak-prod
          sleep 10

      - name: Download Backup File
        run: |
          echo "Downloading ${{ env.LATEST_BACKUP }} from backup PVC..."
          kubectl cp site-speak-db-backup/${{ env.BACKUP_POD }}:/backups/${{ env.LATEST_BACKUP }} /tmp/${{ env.LATEST_BACKUP }}

      - name: Restore Backup File
        run: |
          echo "Restoring ${{ env.LATEST_BACKUP }}..."
          # Give connections a moment to fully drop before restoring
          sleep 5
          kubectl exec -i deployment/postgres-deployment -n site-speak-prod -- psql -U site-speak-user -d site-speak-db < /tmp/${{ env.LATEST_BACKUP }}

      - name: Clean up temporary file
        run: rm /tmp/${{ env.LATEST_BACKUP }}

      - name: Restore API (Scale Up)
        if: always() # Ensure this runs even if the restore step fails
        run: |
          echo "Scaling API back up..."
          kubectl scale deployment api-deployment --replicas=3 -n site-speak-prod
          kubectl rollout status deployment/api-deployment -n site-speak-prod
